sonar.projectKey=AltairaLabs_PromptArena-deploy-omnia
sonar.organization=altairalabs

sonar.sources=.
# Exclude e2e/CI infrastructure from analysis: the full-stack e2e helper
# (test/e2e/**, e.g. converse.py) and its workflow legitimately use in-cluster
# plaintext ws://:8080 and internal CI URLs — not product code the quality gate
# should judge, and they carry no unit coverage by design.
sonar.exclusions=**/*_test.go,**/vendor/**,test/e2e/**,.github/workflows/e2e.yml
sonar.tests=.
sonar.test.inclusions=**/*_test.go

sonar.go.coverage.reportPaths=coverage.out

# Exclude only the main entry point from coverage. The HTTP client
# (client_real.go) is covered via httptest and IS coverage-gated.
sonar.coverage.exclusions=**/main.go

sonar.sourceEncoding=UTF-8
