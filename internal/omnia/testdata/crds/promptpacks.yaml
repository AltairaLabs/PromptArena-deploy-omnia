---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: promptpacks.omnia.altairalabs.ai
spec:
  group: omnia.altairalabs.ai
  names:
    kind: PromptPack
    listKind: PromptPackList
    plural: promptpacks
    singular: promptpack
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: Prompt pack version
      jsonPath: .spec.version
      name: Version
      type: string
    - description: Current phase
      jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          PromptPack is the Schema for the promptpacks API.
          It defines a versioned prompt configuration with rollout strategy support.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of PromptPack
            properties:
              skills:
                description: |-
                  skills selects content from SkillSources for the agents using this
                  pack. All entries go through a SkillSource — the CRD layer does not
                  accept inline skill content.
                items:
                  description: SkillRef selects content from a SkillSource for a PromptPack.
                  properties:
                    include:
                      description: |-
                        include narrows the set of skills exposed from the source to those
                        whose SKILL.md frontmatter name matches one of the entries. Empty =
                        all skills the source has synced (after its own filter).
                      items:
                        type: string
                      type: array
                    mountAs:
                      description: |-
                        mountAs renames the group under which these skills are exposed to
                        the runtime. Defaults to the source's targetPath basename. Used to
                        give PromptPack workflow states a stable "skills: ./skills/<group>"
                        path that doesn't depend on the upstream directory layout.
                      pattern: ^[a-z0-9]([a-z0-9-]*[a-z0-9])?$
                      type: string
                    source:
                      description: |-
                        source is the name of a SkillSource in the same namespace as the
                        PromptPack. Cross-namespace references are not supported.
                      minLength: 1
                      type: string
                  required:
                  - source
                  type: object
                type: array
              skillsConfig:
                description: skillsConfig tunes the PromptKit skill runtime (max active,
                  selector).
                properties:
                  maxActive:
                    description: |-
                      maxActive caps the number of concurrently active skills.
                      Defaults to PromptKit's default (5).
                    format: int32
                    minimum: 1
                    type: integer
                  selector:
                    default: model-driven
                    description: selector picks the skill selection strategy.
                    enum:
                    - model-driven
                    - tag
                    - embedding
                    type: string
                type: object
              source:
                description: source specifies where the prompt configuration is stored.
                properties:
                  configMapRef:
                    description: |-
                      configMapRef references a ConfigMap containing the prompt configuration.
                      Required when type is "configmap".
                    properties:
                      name:
                        default: ""
                        description: |-
                          Name of the referent.
                          This field is effectively required, but due to backwards compatibility is
                          allowed to be empty. Instances of this type with an empty value here are
                          almost certainly wrong.
                          More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                        type: string
                    type: object
                    x-kubernetes-map-type: atomic
                  type:
                    description: |-
                      type specifies the type of source for the prompt configuration.
                      Currently only "configmap" is supported.
                    enum:
                    - configmap
                    type: string
                required:
                - type
                type: object
              version:
                description: |-
                  version specifies the semantic version of this prompt pack.
                  Must follow semver format (e.g., "1.0.0", "2.1.0-beta.1").
                pattern: ^v?(\d+)\.(\d+)\.(\d+)(-[a-zA-Z0-9]+(\.[a-zA-Z0-9]+)*)?(\+[a-zA-Z0-9]+(\.[a-zA-Z0-9]+)*)?$
                type: string
            required:
            - source
            - version
            type: object
          status:
            description: status defines the observed state of PromptPack
            properties:
              activeVersion:
                description: activeVersion is the currently active version serving
                  production traffic.
                type: string
              conditions:
                description: conditions represent the current state of the PromptPack
                  resource.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastUpdated:
                description: lastUpdated is the timestamp of the last status update.
                format: date-time
                type: string
              phase:
                description: phase represents the current lifecycle phase of the PromptPack.
                enum:
                - Pending
                - Active
                - Superseded
                - Failed
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
