# GoReleaser configuration for promptarena-deploy-omnia
# See: https://goreleaser.com

version: 2

builds:
  - id: promptarena-deploy-omnia
    binary: promptarena-deploy-omnia
    main: .
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/AltairaLabs/promptarena-deploy-omnia/internal/omnia.Version={{.Version}}
      - -X github.com/AltairaLabs/promptarena-deploy-omnia/internal/omnia.Commit={{.Commit}}
      - -X github.com/AltairaLabs/promptarena-deploy-omnia/internal/omnia.Date={{.Date}}
    mod_timestamp: '{{ .CommitTimestamp }}'

archives:
  # Bare binary (no tar.gz) named to match exactly what the promptarena
  # installer downloads: promptarena-deploy-omnia_<goos>_<goarch>.
  # {{ .Os }}/{{ .Arch }} are the raw GOOS/GOARCH the installer computes via
  # runtime.GOOS/runtime.GOARCH — no x86_64/title-case translation.
  - id: default
    formats: [binary]
    name_template: "promptarena-deploy-omnia_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'

release:
  github:
    owner: AltairaLabs
    name: promptarena-deploy-omnia
  draft: true
  name_template: "promptarena-deploy-omnia {{.Version}}"
