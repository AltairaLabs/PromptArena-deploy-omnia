                    type: integer
                  mcp:
                    description: mcp is the internal MCP management-plane port (function-mode
                      agents).
                    format: int32
                    type: integer
                  ws:
                    description: ws is the internal WebSocket management-plane port.
                    format: int32
                    type: integer
                type: object
              observedGeneration:
                description: observedGeneration is the most recent generation observed
                  by the controller.
                format: int64
                type: integer
              phase:
                description: phase represents the current lifecycle phase of the AgentRuntime.
                enum:
                - Pending
                - Running
                - Failed
                type: string
              replicas:
                description: replicas tracks the replica counts for the deployment.
                properties:
                  available:
                    description: available is the number of available replicas.
                    format: int32
                    type: integer
                  desired:
                    description: desired is the desired number of replicas.
                    format: int32
                    type: integer
                  ready:
                    description: ready is the number of ready replicas.
                    format: int32
                    type: integer
                required:
                - available
                - desired
                - ready
                type: object
              rollout:
                description: rollout reports the current state of an active rollout,
                  if any.
                properties:
                  active:
                    description: active indicates whether a rollout is currently in
                      progress.
                    type: boolean
                  candidateVersion:
                    description: candidateVersion is the version identifier of the
                      candidate being rolled out.
                    type: string
                  currentStep:
                    description: currentStep is the zero-based index of the step currently
                      being executed.
                    format: int32
                    type: integer
                  currentWeight:
                    description: currentWeight is the percentage of traffic currently
                      sent to the candidate.
                    format: int32
                    type: integer
                  message:
                    description: message is a human-readable description of the current
                      rollout state.
                    type: string
                  promoting:
                    description: |-
                      promoting indicates a promotion is in progress: spec has advanced to the
                      candidate config and the stable Deployment is rolling to it in the
                      background, while the validated candidate keeps serving 100% of traffic.
                      Cleared once the stable Deployment is healthy on the new config and
                      traffic has cut back to it. This is what makes promotion zero-downtime —
                      no request is served from a cold/restarting stable pod.
                    type: boolean
                  stableVersion:
                    description: stableVersion is the version identifier of the current
                      stable deployment.
                    type: string
                  startedAt:
                    description: startedAt is the RFC3339 timestamp when the rollout
                      began.
                    type: string
                  stepStartedAt:
                    description: |-
                      stepStartedAt is the RFC3339 timestamp when the controller entered
                      the step pointed to by currentStep. Used to honour pause durations
                      across reconciles: a pause step only advances once
                      (now - stepStartedAt) >= the pause duration.
                    type: string
                  trafficRoutingMode:
                    description: |-
                      trafficRoutingMode is the mode the controller actually resolved to (may
                      differ from spec.trafficRouting.mode when degraded).
                    type: string
                  trafficWeightEnforced:
                    description: |-
                      trafficWeightEnforced is true when delivered weight matches the reported
                      step (mode mesh/external), false when approximated by replica ratio
                      (mode replicaWeighted). Lets dashboards label the weight "approx".
                    type: boolean
                type: object
              serviceEndpoint:
                description: |-
                  serviceEndpoint is the internal Kubernetes service endpoint for the agent facade.
                  Format: {name}.{namespace}.svc.cluster.local:{port}
                  This can be used by dashboard or other services to connect to the agent.
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
