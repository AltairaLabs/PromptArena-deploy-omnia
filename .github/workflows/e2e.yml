name: E2E (Kind)

# Full-stack e2e: stand up a real Omnia on ephemeral Kind and drive the adapter
# end to end. See docs/local-backlog/2026-07-09-e2e-testing-design.md (SP2).
#
# Built incrementally, validated via real CI runs:
#   1. stack up  — install Omnia, assert operator/dashboard      [green]
#   2. deploy    — adapter apply -> AgentRuntimes created         [this increment]
#   3. converse  — websocket turn -> agent responds (needs DB-backed services)
#
# Full-stack e2e is slow (~10 min) and pulls the whole Omnia image set, so it is
# NOT run per-PR: it runs on demand and nightly.
on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: read
  packages: read # pre-pull agent-pod images from ghcr into the Kind node

env:
  # Omnia chart + image tag (NO leading "v" — ghcr tags are unprefixed, unlike
  # the git tag / CRD-contract pin in testdata/crds/VERSION).
  OMNIA_VERSION: "0.9.0-beta.17"
  CHART: "oci://ghcr.io/altairalabs/charts/omnia"
  NS: "omnia-system"
  AGENTS_NS: "e2e-agents"
  WORKSPACE: "e2e-workspace"
  PROVIDER: "test-provider"
  CERT_MANAGER_VERSION: "v1.16.2"
  KIND_VERSION: "v0.24.0"

jobs:
  e2e:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.0'

      - name: Install kind
        run: |
          curl --retry 3 --retry-delay 5 -Lo ./kind \
            "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-amd64"
          chmod +x ./kind && sudo mv ./kind /usr/local/bin/kind
          kind version

      - name: Create cluster
        run: |
          kind create cluster --name e2e --wait 90s
          kubectl cluster-info

      - name: Install cert-manager
        run: |
          kubectl apply -f "https://github.com/cert-manager/cert-manager/releases/download/${CERT_MANAGER_VERSION}/cert-manager.yaml"
          kubectl -n cert-manager rollout status deployment/cert-manager --timeout=180s
          kubectl -n cert-manager rollout status deployment/cert-manager-webhook --timeout=180s
          kubectl -n cert-manager rollout status deployment/cert-manager-cainjector --timeout=180s

      - name: Helm install Omnia (anonymous auth, keda off)
        run: |
          helm install omnia "${CHART}" --version "${OMNIA_VERSION}" \
            --namespace "${NS}" --create-namespace \
            --set dashboard.auth.mode=anonymous \
            --set dashboard.auth.allowAnonymous=true \
            --set keda.enabled=false \
            --set 'workspaceContent.persistence.accessModes[0]=ReadWriteOnce' \
            --timeout 5m

      - name: Assert operator + dashboard Ready
        run: |
          kubectl get crd agentruntimes.omnia.altairalabs.ai
          kubectl -n "${NS}" rollout status deployment/omnia-controller-manager --timeout=240s
          kubectl -n "${NS}" rollout status deployment/omnia-dashboard --timeout=240s

      - name: Pre-cache agent-pod images into Kind (avoid cold-pull under the reconcile poll)
        # The adapter's Apply now blocks until each AgentRuntime reconciles to Ready.
        # A cold image pull for the agent pod (facade + framework/runtime +
        # policy-broker) on a fresh Kind node can exceed that budget and fail the
        # FIRST agent deploy. Read the real image refs from the installed operator's
        # args (so this stays correct across version bumps) and load them into the
        # node ahead of time. Best-effort: a miss just falls back to a normal pull.
        run: |
          set -x
          args=$(kubectl -n "${NS}" get deploy omnia-controller-manager \
            -o jsonpath='{.spec.template.spec.containers[0].args}')
          # Agent-pod images only: facade, the promptkit framework/runtime, policy-broker.
          # grep -o pulls the ghcr ref out of "--framework-image=promptkit=ghcr.io/...".
          echo "$args" | tr ',' '\n' \
            | grep -E 'facade-image|framework-image=promptkit|policy-broker-image' \
            | grep -oE 'ghcr\.io/[^"]+' | sort -u > /tmp/agent-images.txt || true
          echo "images to pre-cache:"; cat /tmp/agent-images.txt || true
          echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin || true
          while read -r img; do
            [ -z "$img" ] && continue
            docker pull "$img" && kind load docker-image "$img" --name e2e || true
          done < /tmp/agent-images.txt

      - name: Bootstrap workspace + mock provider
        run: |
          kubectl create namespace "${AGENTS_NS}"
          cat <<EOF | kubectl apply -f -
          apiVersion: v1
          kind: Secret
          metadata: { name: ${PROVIDER}, namespace: ${AGENTS_NS} }
          # The operator requires one of the expected credential keys even for a
          # mock provider (api-key | ANTHROPIC_API_KEY | OPENAI_API_KEY | GEMINI_API_KEY);
          # a placeholder value is fine for type: mock.
          stringData: { api-key: "mock" }
          ---
          # Shared bearer token for the agents' data-plane auth (facade reads key
          # "token"). Agents are management-plane-only without an externalAuth
          # validator; this lets the converse step talk to them.
          apiVersion: v1
          kind: Secret
          metadata: { name: e2e-agent-token, namespace: ${AGENTS_NS} }
          stringData: { token: "e2e-secret" }
          ---
          apiVersion: omnia.altairalabs.ai/v1alpha1
          kind: Provider
          metadata: { name: ${PROVIDER}, namespace: ${AGENTS_NS} }
          spec:
            type: mock
            credential:
              secretRef: { name: ${PROVIDER} }
          ---
          apiVersion: omnia.altairalabs.ai/v1alpha1
          kind: Workspace
          metadata: { name: ${WORKSPACE} }
          spec:
            displayName: E2E Test Workspace
            namespace: { name: ${AGENTS_NS} }
            # Anonymous auth authenticates but the dashboard still enforces
            # workspace authz; grant the anonymous identity owner so the adapter
            # (token "anonymous") can create/destroy resources in this test WS.
            anonymousAccess:
              enabled: true
              role: owner
            # NO service group on purpose: the facade then can't resolve a
            # session-api URL and falls back to an in-memory session store, so a
            # basic agent reaches Ready with no session-api / Postgres / memory-api.
          EOF
          kubectl get workspace "${WORKSPACE}" -o yaml

      - name: Port-forward dashboard
        run: |
          kubectl -n "${NS}" port-forward svc/omnia-dashboard 3000:3000 >/tmp/pf.log 2>&1 &
          echo "PF_PID=$!" >> "$GITHUB_ENV"
          for i in $(seq 1 30); do
            if curl -fsS -o /dev/null "http://localhost:3000/api/health" 2>/dev/null || \
               curl -fsS -o /dev/null "http://localhost:3000" 2>/dev/null; then
              echo "dashboard reachable"; break
            fi
            sleep 2
          done

      - name: Deploy persistent agents via the adapter (single-prompt + fan-out)
        env:
          OMNIA_IT_ENDPOINT: "http://localhost:3000"
          OMNIA_IT_TOKEN: "anonymous"
          OMNIA_IT_WORKSPACE: ${{ env.WORKSPACE }}
          OMNIA_IT_PROVIDER: ${{ env.PROVIDER }}
          OMNIA_IT_KEEP: "1"
          OMNIA_IT_SHARED_TOKEN_SECRET: "e2e-agent-token"
        run: |
          # Single-prompt pack -> one agent "e2e-basic".
          OMNIA_IT_PACK_ID=e2e-basic OMNIA_IT_PROMPTS=main \
            GOWORK=off go test -tags=integration -run TestIntegration_E2EDeployAndKeep \
              ./internal/omnia/ -count=1 -v
          # Multi-prompt pack -> fan-out to agents "e2e-multi-triage" and "e2e-multi-billing".
          OMNIA_IT_PACK_ID=e2e-multi OMNIA_IT_PROMPTS=triage,billing \
            GOWORK=off go test -tags=integration -run TestIntegration_E2EDeployAndKeep \
              ./internal/omnia/ -count=1 -v

      - name: Deploy GitHub tool + validate bearer auth via tool-test
        # Deploys a pack whose only tool is a live GitHub rate_limit call (auth from
        # GITHUB_TOKEN), then asserts via the dashboard tool-test API that the token
        # was applied (authenticated core limit > 60). This exercises auto-create-
        # from-source, the enriched httpConfig, the bearer auth stanza, and Secret
        # provisioning end to end — the customer's #1 and #3 lessons.
        env:
          OMNIA_IT_ENDPOINT: "http://localhost:3000"
          OMNIA_IT_TOKEN: "anonymous"
          OMNIA_IT_WORKSPACE: ${{ env.WORKSPACE }}
          OMNIA_IT_PROVIDER: ${{ env.PROVIDER }}
          OMNIA_IT_PACK_ID: "e2e-ghtool"
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          # Fallback: pre-create the credential Secret the adapter's auth stanza
          # references, in case the adapter's POST /api/secrets lacks CREDENTIALS_*
          # perms for the anonymous token. The name MUST equal
          # credentialSecretName(pack id) = "<pack-id>-tool-credentials", and the key
          # MUST equal the env var the tool declares (GITHUB_TOKEN), holding the RAW
          # token (the executor prepends "Bearer "). Idempotent apply.
          kubectl -n "${AGENTS_NS}" create secret generic e2e-ghtool-tool-credentials \
            --from-literal=GITHUB_TOKEN="${{ github.token }}" \
            --dry-run=client -o yaml | kubectl apply -f -
          GOWORK=off go test -tags=integration -run TestIntegration_GitHubToolAuth \
            ./internal/omnia/ -count=1 -v

      - name: Wait for agent Deployments to be Available
        run: |
          # The operator names each agent's Deployment after the AgentRuntime.
          # Do NOT trust the adapter's Status (it reports "deployed" before pods
          # are Ready) — gate on real K8s readiness here.
          for AGENT in e2e-basic e2e-multi-triage e2e-multi-billing; do
            echo "===== waiting for deployment/${AGENT} ====="
            for i in $(seq 1 40); do
              if kubectl -n "${AGENTS_NS}" get "deployment/${AGENT}" >/dev/null 2>&1; then break; fi
              echo "  deployment/${AGENT} not created yet ($i)"; sleep 3
            done
            kubectl -n "${AGENTS_NS}" rollout status "deployment/${AGENT}" --timeout=180s
          done

      - name: Converse with each agent (websocket -> non-error response)
        run: |
          kubectl create configmap converse-script -n "${AGENTS_NS}" \
            --from-file=converse.py=test/e2e/converse.py
          for AGENT in e2e-basic e2e-multi-triage e2e-multi-billing; do
            echo "===== converse: ${AGENT} ====="
            cat <<EOF | kubectl apply -f -
          apiVersion: v1
          kind: Pod
          metadata: { name: converse-${AGENT}, namespace: ${AGENTS_NS} }
          spec:
            restartPolicy: Never
            containers:
              - name: converse
                image: python:3.12-slim
                command: ["bash", "-c", "pip install websockets --quiet && python /s/converse.py"]
                env:
                  - { name: AGENT, value: "${AGENT}" }
                  - { name: NS, value: "${AGENTS_NS}" }
                  - { name: TOKEN, value: "e2e-secret" }
                volumeMounts:
                  - { name: s, mountPath: /s }
            volumes:
              - name: s
                configMap: { name: converse-script }
          EOF
            for i in $(seq 1 60); do
              phase=$(kubectl get pod "converse-${AGENT}" -n "${AGENTS_NS}" -o jsonpath='{.status.phase}' 2>/dev/null || true)
              if [ "$phase" = "Succeeded" ] || [ "$phase" = "Failed" ]; then break; fi
              sleep 3
            done
            kubectl logs "converse-${AGENT}" -n "${AGENTS_NS}" || true
            kubectl logs "converse-${AGENT}" -n "${AGENTS_NS}" 2>/dev/null | grep -q "CONVERSE OK" \
              || { echo "::error::${AGENT} did not answer without error"; exit 1; }
          done

      - name: Diagnostics
        if: always()
        run: |
          echo "===== omnia-system pods ====="; kubectl get pods -n "${NS}" -o wide || true
          echo "===== agents-ns all ====="; kubectl get all,agentruntime,promptpack,toolregistry,agentpolicy,provider -n "${AGENTS_NS}" || true
          echo "===== agentruntime conditions ====="
          for a in e2e-basic e2e-multi-triage e2e-multi-billing; do
            echo "--- $a ---"; kubectl -n "${AGENTS_NS}" get agentruntime "$a" -o jsonpath='{.status.phase}{"\n"}{range .status.conditions[*]}{.type}={.status} {.reason}: {.message}{"\n"}{end}' 2>/dev/null || true
          done
          echo "===== provider status ====="; kubectl -n "${AGENTS_NS}" get provider "${PROVIDER}" -o jsonpath='{.status}' || true; echo
          echo "===== agent pods: which container is not ready + why ====="
          for p in $(kubectl -n "${AGENTS_NS}" get pods -o name | grep -E 'e2e-basic|e2e-multi'); do
            echo "----- $p container readiness -----"
            kubectl -n "${AGENTS_NS}" get "$p" -o jsonpath='{range .status.containerStatuses[*]}{.name}: ready={.ready} state={.state}{"\n"}{end}' 2>/dev/null || true
            echo "----- $p events/probes -----"
            kubectl -n "${AGENTS_NS}" describe "$p" 2>/dev/null | sed -n '/Containers:/,/Events:/p' | grep -iE "State|Ready|Restart|Probe|Liveness|Readiness|Reason|Exit|Message|Warning" | head -30 || true
            echo "----- $p logs (all containers) -----"
            kubectl -n "${AGENTS_NS}" logs "$p" --all-containers --prefix --tail=40 2>/dev/null || true
          done
          echo "===== workspace status ====="; kubectl get workspace "${WORKSPACE}" -o jsonpath='{.status}' || true; echo
          echo "===== dashboard logs (tail) ====="; kubectl -n "${NS}" logs deploy/omnia-dashboard --tail=60 || true
          echo "===== port-forward log ====="; cat /tmp/pf.log || true
          echo "===== recent events (agents-ns) ====="; kubectl get events -n "${AGENTS_NS}" --sort-by=.lastTimestamp | tail -40 || true
