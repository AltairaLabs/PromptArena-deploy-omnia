---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: toolregistries.omnia.altairalabs.ai
spec:
  group: omnia.altairalabs.ai
  names:
    kind: ToolRegistry
    listKind: ToolRegistryList
    plural: toolregistries
    singular: toolregistry
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: Number of discovered tools
      jsonPath: .status.discoveredToolsCount
      name: Tools
      type: integer
    - description: Current phase
      jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          ToolRegistry is the Schema for the toolregistries API.
          It defines a collection of tool handlers that expose tools to agents.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of ToolRegistry
            properties:
              handlers:
                description: |-
                  handlers defines the list of tool handlers in this registry.
                  Each handler can expose one or more tools.
                items:
                  description: HandlerDefinition defines a tool handler that exposes
                    one or more tools
                  properties:
                    auth:
                      description: |-
                        auth configures how the runtime authenticates to this handler's backend.
                        Applies to http, openapi, grpc, and mcp handlers. Supersedes the legacy
                        per-config authType/authSecretRef fields; setting both is rejected.
                      properties:
                        secretRef:
                          description: |-
                            secretRef holds the credential for bearer/basic. For bearer the key's value
                            is the token; for basic it is "username:password".
                          properties:
                            key:
                              description: key is the key in the secret to select.
                              type: string
                            name:
                              description: name is the name of the secret.
                              type: string
                          required:
                          - key
                          - name
                          type: object
                        serviceAccount:
                          description: |-
                            serviceAccount configures an audience-bound projected SA token. The tool
                            backend validates the token via the Kubernetes TokenReview API.
                          properties:
                            audience:
                              description: |-
                                audience the projected token is bound to; the tool backend validates it
                                (via TokenReview) against this audience.
                              type: string
                          required:
                          - audience
                          type: object
                        type:
                          default: none
                          description: |-
                            type selects the authentication mechanism:
                              none             — no credential (default)
                              bearer           — Authorization: Bearer <secretRef value>
                              basic            — Authorization: Basic <base64(secretRef "user:password")>
                              serviceAccount   — audience-bound projected Kubernetes ServiceAccount token
                              workloadIdentity — resolved by the runtime under the pod's ambient Azure
                                                 identity (core)
                          enum:
                          - none
                          - bearer
                          - basic
                          - serviceAccount
                          - workloadIdentity
                          type: string
                        workloadIdentity:
                          description: |-
                            workloadIdentity configures hosted same-cloud identity, resolved by the
                            runtime under the pod's ambient Azure identity (core).
                          properties:
                            audience:
                              description: audience for the federated token exchange.
                              type: string
                            cloud:
                              description: cloud identity provider.
                              enum:
                              - azure
                              type: string
                            header:
                              default: Authorization
                              description: header carries the resolved token. Defaults
                                to Authorization.
                              type: string
                          required:
                          - audience
                          - cloud
                          type: object
                      required:
                      - type
                      type: object
                      x-kubernetes-validations:
                      - message: auth.type bearer/basic requires secretRef
                        rule: self.type != 'bearer' && self.type != 'basic' || has(self.secretRef)
                      - message: auth.type serviceAccount requires the serviceAccount
                          block
                        rule: self.type != 'serviceAccount' || has(self.serviceAccount)
                      - message: auth.type workloadIdentity requires the workloadIdentity
                          block
                        rule: self.type != 'workloadIdentity' || has(self.workloadIdentity)
                    clientConfig:
                      description: |-
                        clientConfig contains client-side tool configuration.
                        Used when type is "client".
                      properties:
                        categories:
                          description: |-
                            categories are semantic consent categories (e.g., "location", "camera").
                            Clients can use these to remember consent preferences per category.
                          items:
                            type: string
                          type: array
                        consentMessage:
                          description: |-
                            consentMessage is a human-readable message shown to the user before
                            the tool is executed. If empty, the tool runs without a consent prompt.
                          type: string
                      type: object
                    grpcConfig:
                      description: |-
                        grpcConfig contains gRPC-specific configuration.
                        Required when type is "grpc".
                      properties:
                        endpoint:
                          description: endpoint is the gRPC server address (host:port).
                          type: string
                        retryPolicy:
                          description: |-
                            retryPolicy configures retry behavior for this gRPC tool.
                            When nil, tool calls are executed once with no retries.
                          properties:
                            backoffMultiplier:
                              default: "2.0"
                              description: |-
                                backoffMultiplier multiplies the delay between successive retries.
                                Must parse as a float >= 1.0.
                              pattern: ^[0-9]+(\.[0-9]+)?$
                              type: string
                            initialBackoff:
                              default: 100ms
                              description: initialBackoff is the delay before the
                                first retry attempt.
                              type: string
                            maxAttempts:
                              description: |-
                                maxAttempts is the maximum total number of attempts, including the first.
                                A value of 1 means no retries. Must be between 1 and 10.
                              format: int32
                              maximum: 10
                              minimum: 1
                              type: integer
                            maxBackoff:
                              default: 30s
                              description: maxBackoff is the upper bound on delay
                                between retry attempts.
                              type: string
                            retryableStatusCodes:
                              description: |-
                                retryableStatusCodes is the list of gRPC status codes that trigger a retry.
                                Defaults to ["UNAVAILABLE", "DEADLINE_EXCEEDED", "RESOURCE_EXHAUSTED"] if unset.
                                Set to an empty list to disable status-code-based retry entirely.
                                Values must be valid gRPC status code names.
                              items:
                                type: string
                              type: array
                          required:
                          - maxAttempts
                          type: object
                        tls:
                          description: tls enables TLS for the connection.
                          type: boolean
                        tlsCAPath:
                          description: tlsCAPath is the path to the CA certificate.
                          type: string
                        tlsCertPath:
                          description: tlsCertPath is the path to the TLS certificate.
                          type: string
                        tlsInsecureSkipVerify:
                          description: tlsInsecureSkipVerify skips TLS verification
                            (not recommended for production).
                          type: boolean
                        tlsKeyPath:
                          description: tlsKeyPath is the path to the TLS key.
                          type: string
                      required:
                      - endpoint
                      type: object
                    httpConfig:
                      description: |-
                        httpConfig contains HTTP-specific configuration.
                        Required when type is "http".
                      properties:
                        authSecretRef:
                          description: |-
                            authSecretRef references a secret containing auth credentials.
