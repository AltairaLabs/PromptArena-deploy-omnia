sonar.projectKey=AltairaLabs_PromptArena-deploy-omnia
sonar.organization=altairalabs

sonar.sources=.
sonar.exclusions=**/*_test.go,**/vendor/**
sonar.tests=.
sonar.test.inclusions=**/*_test.go

sonar.go.coverage.reportPaths=coverage.out

# Exclude only the main entry point from coverage. The HTTP client
# (client_real.go) is covered via httptest and IS coverage-gated.
sonar.coverage.exclusions=**/main.go

sonar.sourceEncoding=UTF-8
